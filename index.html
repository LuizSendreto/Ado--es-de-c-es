<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="fundo">


        <header>
            <nav>
                <h2>Um Aumigo para Sempre!</h2>


                <img id="icon" src="assets/amigo-removebg-preview.png" alt="">
            </nav>
        </header>
    </div>

    <main>
        <h3>Responda esse Formulario para adotar seu Aumigo!</h3>
        <form id="formAdocao">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu Nome">
            <br>

            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="Digite seu email">
            <br>

            <label for="moradia">Moradia:</label>
            <select name="moradia" id="moradia">

                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>

            </select>
            <br>

            <label for="quintal">Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim"> Sim
            <input type="radio" name="quintal" value="não"> Não
            <br>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="Digite seu telefone">
            <br>

            <button type="submit">Enviar</button>

        </form>

        <div id="resultado"></div>

    </main>

</body>
<script src="script.js"></script>

</html>
