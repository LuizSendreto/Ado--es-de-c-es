<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <nav>
            <h2>Um Aumigo para Sempre!</h2>


            <img id="icon" src="assets/amigo-removebg-preview.png" alt="">
        </nav>
    </header>
    </div>

    <main>
        <h3>Responda esse Formulario para adotar seu Aumigo!</h3>
        <form id="formAdocao">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu Nome">
            <br>

            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="Digite seu email">
            <br>

            <label for="moradia">Moradia:</label>
            <select name="moradia" id="moradia">

                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>

            </select>
            <br>

            <label for="quintal">Possui Quintal?</label> <br>
            <input type="radio" name="quintal" value="sim"> Sim
            <input type="radio" name="quintal" value="não"> Não
            <br>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="Digite seu telefone">
            <br>


            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="Digite seu CPF">
            <br>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="Sua idade">
            <br>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" placeholder="Sua cidade">
            <br>

            <label for="pet">Ja teve pet?</label> <br>
            <input type="radio" name="pet" value="sim"> Sim
            <input type="radio" name="pet" value="nao"> Não
            <br>

            <label for="horas">Quantas horas o animal ficará sozinho?</label>
            <input type="number" id="horas">
            <br>

            <label for="motivo">Motivo da adoção:</label>
            <input type="text" id="motivo"></input>
            <br>

            <label>
                <input type="checkbox" id="termo"> Aceito os termos de responsabilidade
            </label>
            <br>

            <button id="button2" type="submit">Enviar</button>

        </form>

        <div id="resultado"></div>

    </main>


    <script src="script.js"></script>
</body>

</html>
